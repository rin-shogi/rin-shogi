# floodgate 接続設定 — Rin-suisho5-v1(出発点: 水匠5評価関数)
#
# 起動:
#   python scripts/floodgate_client.py --config configs/match/floodgate_v1.yaml
#
# 事前準備:
#   1. .env に FLOODGATE_PASSWORD を設定(リポジトリ root の .env.example 参照)。
#      floodgate は Web フォーム登録不要 — 任意のパスワードで初回接続すれば
#      ハンドル `Rin-suisho5-v1` が以降そのパスワード付きで予約される。
#   2. engine/bin/YaneuraOu-NORMAL.exe がビルド済みであること(docs/BUILD.md)
#   3. evals/baseline/suisho5/ に水匠5の nn.bin が配置済みであること
#      (evals/baseline/suisho5/fetch.ps1 で取得)
#
# パス解決メモ: 本 YAML 内の相対パスは「この YAML のあるディレクトリ
# (configs/match/) からの相対」として解決される(scripts/utils/config.py の
# resolve_path 参照)。リポジトリ root に到達するには ../../ が必要。

name: Rin-suisho5-v1
mode: floodgate

server:
  host: wdoor.c.u-tokyo.ac.jp
  port: 4081

account:
  # ハンドル名(任意、登録不要)
  username: Rin-suisho5-v1
  # floodgate CSA モードでは LOGIN のパスワード欄が「<game_type>,<trip>」形式:
  #   game_type = マッチメイキングキューの識別子(時間制を兼ねる)
  #   trip      = ユーザ固有の秘密文字列(同名ユーザの区別用)
  # 公式: http://wdoor.c.u-tokyo.ac.jp/shogi/floodgate.html
  game_type: floodgate-300-10F   # 5 分切れ負け + 10 秒フィッシャー(floodgate 標準)
  trip: $env:FLOODGATE_PASSWORD  # .env で設定。平文で流れるため重要なものは使わない

engine:
  # 相対パスは「この YAML のあるディレクトリ(configs/match/)からの相対」
  binary: ../../engine/bin/YaneuraOu-NORMAL.exe
  # cwd を engine/bin にする必要があれば指定(EvalDir を相対指定する場合)
  # cwd: ../../engine/bin
  options:
    # スレッド数(本端末: AMD Ryzen 7 7735HS、論理 16)
    Threads: 8
    # 置換表(MB)。1 局 5〜15 分のため大きめが有利
    USI_Hash: 4096
    # 評価関数ディレクトリ
    EvalDir: ../../evals/baseline/suisho5
    # FV_SCALE は水匠5の推奨値
    FV_SCALE: 24
    # ネットワーク遅延の補正(floodgate 用、ms)
    NetworkDelay: 120
    NetworkDelay2: 1120
    # 思考スレッドあたりの探索打ち切り(任意。標準値で OK)
    # MinimumThinkingTime: 1000

# 棋譜・ログ保存先(リポジトリ root の kifu/, results/floodgate/ を指す)
log_dir: ../../results/floodgate/Rin-suisho5-v1
kifu_dir: ../../kifu

# 自動再接続(切断時)
auto_reconnect: true
# 異常切断時の再接続待ち(秒)
reconnect_wait_sec: 30
# 対局後の通常切断時の再接続待ち(秒)。floodgate は1局ごとに close するため、
# 次の対局を素早く待ち受けるよう短めに設定
post_game_wait_sec: 3
max_consecutive_failures: 5

# 1 セッションでの最大対局数(0 / null = 無制限)。平日夜運用なので保守的に
max_games_per_session: 50

# ログレベル: DEBUG / INFO / WARNING
log_level: INFO
